<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>禅·方块</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --ink:#1a1a1a; --paper:#f5f0e8; --gray1:#888; --gray2:#bbb; --gray3:#ddd; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body {
    background:var(--paper); color:var(--ink);
    font-family:'Noto Serif SC','Source Han Serif','思源宋体','宋体',serif;
    display:flex; flex-direction:column; align-items:center;
    position:relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse at 20% 20%,rgba(0,0,0,0.03) 0%,transparent 60%),
               radial-gradient(ellipse at 80% 80%,rgba(0,0,0,0.05) 0%,transparent 60%);
    pointer-events:none; z-index:0;
  }
  #topbar {
    width:100%; display:flex; align-items:center; justify-content:space-between;
    padding:6px 12px; z-index:1;
    border-bottom:1px solid var(--gray3);
    background:rgba(245,240,232,0.95);
    flex-shrink:0;
  }
  .top-title { font-family:'ZCOOL XiaoWei','华文行楷','STXingkai','楷体','KaiTi',serif; font-size:1.1rem; letter-spacing:0.4em; }
  .top-stats { display:flex; gap:12px; }
  .stat { display:flex; flex-direction:column; align-items:center; }
  .stat-label { font-size:0.5rem; letter-spacing:0.2em; color:var(--gray1); }
  .stat-value { font-family:'ZCOOL XiaoWei','华文行楷','STXingkai','楷体','KaiTi',serif; font-size:1rem; }
  #music-btn {
    background:rgba(255,255,255,0.5); border:1px solid var(--gray3);
    color:var(--gray1); font-size:0.9rem; cursor:pointer; padding:2px 7px; border-radius:3px;
  }
  #game-area {
    flex:1; width:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start; position:relative; z-index:1;
    overflow:hidden;
  }
  #canvas-row {
    display:flex; align-items:flex-start; justify-content:center;
    gap:8px; padding:8px 8px 0; flex-shrink:0;
  }
  #side-info { display:flex; flex-direction:column; gap:6px; align-items:center; padding-top:4px; }
  .side-label { font-size:0.5rem; letter-spacing:0.2em; color:var(--gray1); text-align:center; }
  #next-canvas { border:1px solid var(--gray3); background:rgba(255,255,255,0.4); display:block; }
  #game-canvas {
    border:1px solid var(--gray2); background:rgba(255,255,255,0.5);
    box-shadow:3px 3px 12px rgba(0,0,0,0.06); display:block;
  }
  #overlay {
    position:absolute; inset:0; background:rgba(245,240,232,0.93);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; z-index:10; transition:opacity 0.4s;
  }
  #overlay.hidden { opacity:0; pointer-events:none; }
  .overlay-title { font-family:'ZCOOL XiaoWei','华文行楷','STXingkai','楷体','KaiTi',serif; font-size:1.4rem; letter-spacing:0.4em; }
  .overlay-sub { font-size:0.65rem; color:var(--gray1); letter-spacing:0.2em; }
  .start-btn {
    padding:6px 28px; background:var(--ink); color:var(--paper); border:none;
    font-family:'Noto Serif SC','Source Han Serif','思源宋体','宋体',serif; font-size:0.75rem; letter-spacing:0.3em;
    cursor:pointer; margin-top:4px;
  }
  #quote-display {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.85);
    background:rgba(245,240,232,0.96); border:1px solid var(--gray3);
    padding:1.2rem 1.6rem; max-width:240px; text-align:center;
    opacity:0; pointer-events:none; transition:all 0.35s ease;
    z-index:100; box-shadow:0 6px 24px rgba(0,0,0,0.08);
  }
  #quote-display.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
  #quote-text { font-family:'ZCOOL XiaoWei','华文行楷','STXingkai','楷体','KaiTi',serif; font-size:0.95rem; line-height:1.8; letter-spacing:0.1em; }
  #quote-author { font-size:0.6rem; color:var(--gray1); margin-top:0.4rem; letter-spacing:0.2em; }
  #particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:50; }
  #virtual-controls {
    display:none; flex-direction:column; align-items:center;
    gap:5px; padding:8px 0 4px; width:100%; flex-shrink:0;
  }
  .vrow { display:flex; gap:6px; justify-content:center; }
  .vbtn {
    width:58px; height:52px; background:rgba(255,255,255,0.75);
    border:1px solid var(--gray3); color:var(--ink); font-size:1.3rem;
    cursor:pointer; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.07);
    transition:all 0.08s; font-family:'Noto Serif SC','Source Han Serif','思源宋体','宋体',serif;
    -webkit-tap-highlight-color:transparent; user-select:none;
  }
  .vbtn:active { background:var(--ink); color:var(--paper); transform:scale(0.91); }
  .vbtn-wide { width:128px; font-size:0.7rem; letter-spacing:0.2em; height:44px; }
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div id="topbar">
  <div class="top-title">禅·方块</div>
  <div class="top-stats">
    <div class="stat"><div class="stat-label">得分</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">消行</div><div class="stat-value" id="lines">0</div></div>
    <div class="stat"><div class="stat-label">级别</div><div class="stat-value" id="level">1</div></div>
  </div>
  <button id="music-btn">♪</button>
</div>
<div id="game-area">
  <div id="canvas-row">
    <div style="position:relative">
      <canvas id="game-canvas"></canvas>
      <div id="overlay">
        <div class="overlay-title" id="overlay-title">禅·方块</div>
        <div class="overlay-sub" id="overlay-sub">一场关于放松的游戏</div>
        <button class="start-btn" id="start-btn">开始游戏</button>
      </div>
    </div>
    <div id="side-info">
      <div class="side-label">下一个</div>
      <canvas id="next-canvas"></canvas>
    </div>
  </div>
  <div id="virtual-controls">
    <div class="vrow"><button class="vbtn" id="btn-rotate">↻</button></div>
    <div class="vrow">
      <button class="vbtn" id="btn-left">←</button>
      <button class="vbtn" id="btn-down">↓</button>
      <button class="vbtn" id="btn-right">→</button>
    </div>
    <div class="vrow"><button class="vbtn vbtn-wide" id="btn-drop">落下</button></div>
  </div>
</div>
<div id="quote-display"><div id="quote-text"></div><div id="quote-author"></div></div>

<script>
const quotes = [
  {text:"此刻即是归处",author:"—— 禅"},
  {text:"慢下来，才能看见美",author:"—— 无名"},
  {text:"每一次消除，都是一次放下",author:"—— 禅·方块"},
  {text:"不必完美，只需此刻",author:"—— 无名"},
  {text:"呼吸，然后继续",author:"—— 禅"},
  {text:"万物皆流，顺势而为",author:"—— 赫拉克利特"},
  {text:"静水流深",author:"—— 古语"},
  {text:"放手，是另一种握紧",author:"—— 禅·方块"},
  {text:"此刻的你，已经足够好",author:"—— 无名"},
  {text:"山河无恙，你亦无恙",author:"—— 禅·方块"},
];

const PIECES = [
  {shape:[[1,1,1,1]],color:'#1a1a1a'},
  {shape:[[1,1],[1,1]],color:'#3a3a3a'},
  {shape:[[0,1,0],[1,1,1]],color:'#555'},
  {shape:[[1,0,0],[1,1,1]],color:'#6a6a6a'},
  {shape:[[0,0,1],[1,1,1]],color:'#7a7a7a'},
  {shape:[[0,1,1],[1,1,0]],color:'#888'},
  {shape:[[1,1,0],[0,1,1]],color:'#999'},
];

const COLS=10, ROWS=20;
let BLOCK=20;

const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
const nextCanvas=document.getElementById('next-canvas');
const nextCtx=nextCanvas.getContext('2d');
const pCanvas=document.getElementById('particle-canvas');
const pCtx=pCanvas.getContext('2d');

function calcBlock() {
  const topH=document.getElementById('topbar').offsetHeight||44;
  const btnH=document.getElementById('virtual-controls').style.display==='flex'?170:0;
  const availH=window.innerHeight-topH-btnH-16;
  const availW=window.innerWidth-72;
  const byH=Math.floor(availH/ROWS);
  const byW=Math.floor(availW/COLS);
  BLOCK=Math.max(16,Math.min(byH,byW,28));
}

function resizeAll() {
  calcBlock();
  canvas.width=COLS*BLOCK; canvas.height=ROWS*BLOCK;
  const ns=BLOCK*4; nextCanvas.width=ns; nextCanvas.height=ns;
  pCanvas.width=window.innerWidth; pCanvas.height=window.innerHeight;
  if(typeof board !== 'undefined') draw();
  if(nextPiece) drawNext();
}

window.addEventListener('resize', resizeAll);

let board,piece,nextPiece,score,lines,level,gameOver,paused,running,lastDrop,animFrame;
let particles=[];

function init() {
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  score=0; lines=0; level=1; gameOver=false; paused=false;
  updateUI(); nextPiece=randPiece(); spawnPiece();
}

function randPiece() {
  const p=PIECES[Math.floor(Math.random()*PIECES.length)];
  return {shape:p.shape.map(r=>[...r]),color:p.color};
}

function spawnPiece() {
  piece={...nextPiece,shape:nextPiece.shape.map(r=>[...r])};
  piece.x=Math.floor(COLS/2)-Math.floor(piece.shape[0].length/2);
  piece.y=0; nextPiece=randPiece(); drawNext();
  if(collide()) endGame();
}

function collide(p,b) {
  p=p||piece; b=b||board;
  for(let r=0;r<p.shape.length;r++)
    for(let c=0;c<p.shape[r].length;c++)
      if(p.shape[r][c]){
        const nx=p.x+c,ny=p.y+r;
        if(nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&b[ny][nx])) return true;
      }
  return false;
}

function rotate(s){ return s[0].map((_,i)=>s.map(r=>r[i]).reverse()); }

function lock() {
  for(let r=0;r<piece.shape.length;r++)
    for(let c=0;c<piece.shape[r].length;c++)
      if(piece.shape[r][c]&&piece.y+r>=0)
        board[piece.y+r][piece.x+c]=piece.color;
  clearLines(); spawnPiece();
}

function clearLines() {
  let cleared=0; const rows=[];
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c!==0)){
      rows.push(r); board.splice(r,1); board.unshift(Array(COLS).fill(0)); cleared++; r++;
    }
  }
  if(cleared>0){
    lines+=cleared; score+=[0,100,300,500,800][cleared]*level;
    level=Math.floor(lines/10)+1; updateUI(); spawnParticles(rows); showQuote();
  }
}

function updateUI() {
  document.getElementById('score').textContent=score;
  document.getElementById('lines').textContent=lines;
  document.getElementById('level').textContent=level;
}

function drawBlock(cx,x,y,color,bs) {
  bs=bs||BLOCK;
  cx.fillStyle=color; cx.fillRect(x*bs+1,y*bs+1,bs-2,bs-2);
  cx.fillStyle='rgba(255,255,255,0.1)'; cx.fillRect(x*bs+1,y*bs+1,bs-2,2);
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,0,0,0.04)'; ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*BLOCK);ctx.lineTo(canvas.width,r*BLOCK);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*BLOCK,0);ctx.lineTo(c*BLOCK,canvas.height);ctx.stroke();}
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]) drawBlock(ctx,c,r,board[r][c]);
  if(piece){
    let g={...piece,shape:piece.shape.map(r=>[...r])};
    while(!collide({...g,y:g.y+1})) g.y++;
    for(let r=0;r<g.shape.length;r++) for(let c=0;c<g.shape[r].length;c++)
      if(g.shape[r][c]){ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect((g.x+c)*BLOCK+1,(g.y+r)*BLOCK+1,BLOCK-2,BLOCK-2);}
    for(let r=0;r<piece.shape.length;r++) for(let c=0;c<piece.shape[r].length;c++)
      if(piece.shape[r][c]) drawBlock(ctx,piece.x+c,piece.y+r,piece.color);
  }
}

function drawNext() {
  const ns=nextCanvas.width, bs=Math.floor(ns/5);
  nextCtx.clearRect(0,0,ns,ns);
  if(!nextPiece) return;
  const s=nextPiece.shape;
  const ox=Math.floor((ns-s[0].length*bs)/2), oy=Math.floor((ns-s.length*bs)/2);
  for(let r=0;r<s.length;r++) for(let c=0;c<s[r].length;c++)
    if(s[r][c]){nextCtx.fillStyle=nextPiece.color;nextCtx.fillRect(ox+c*bs+1,oy+r*bs+1,bs-2,bs-2);}
}

function spawnParticles(rows) {
  const rect=canvas.getBoundingClientRect();
  rows.forEach(r=>{
    for(let c=0;c<COLS;c++) for(let i=0;i<3;i++)
      particles.push({x:rect.left+(c+0.5)*BLOCK,y:rect.top+(r+0.5)*BLOCK,
        vx:(Math.random()-0.5)*4,vy:(Math.random()-2)*3,size:Math.random()*3+1,alpha:1,
        color:`hsl(0,0%,${Math.random()*40+20}%)`});
  });
}

function updateParticles() {
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles=particles.filter(p=>p.alpha>0.02);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.alpha-=0.025;
    pCtx.globalAlpha=p.alpha; pCtx.fillStyle=p.color;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.size,0,Math.PI*2); pCtx.fill();
  });
  pCtx.globalAlpha=1;
}

let quoteTimer;
function showQuote() {
  const q=quotes[Math.floor(Math.random()*quotes.length)];
  document.getElementById('quote-text').textContent=q.text;
  document.getElementById('quote-author').textContent=q.author;
  const el=document.getElementById('quote-display');
  el.classList.add('show'); clearTimeout(quoteTimer);
  quoteTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

let audioCtx, musicNodes=[], musicScheduler=null, musicOn=false;

// 德彪西风格轻柔旋律 - C大调五声音阶，舒缓如流水
const MELODY = [
  [523.25,1.6],[587.33,0.8],[659.25,0.8],[698.46,1.6],
  [783.99,1.6],[698.46,0.8],[659.25,0.8],[587.33,1.6],
  [523.25,1.6],[659.25,0.8],[783.99,0.8],[880.00,1.6],
  [783.99,0.8],[698.46,0.8],[659.25,0.8],[587.33,0.8],[523.25,2.4],
  [587.33,1.6],[659.25,0.8],[698.46,0.8],[783.99,1.6],
  [698.46,0.8],[659.25,0.8],[587.33,0.8],[523.25,0.8],[493.88,2.4],
];
const BASS = [
  [130.81,3.2],[164.81,3.2],[196.00,3.2],[174.61,3.2],
  [130.81,3.2],[146.83,3.2],[164.81,3.2],[130.81,3.2],
];
const CHORDS = [
  [[261.63,329.63,392.00],6.4],
  [[261.63,349.23,440.00],6.4],
  [[196.00,261.63,329.63],6.4],
  [[220.00,277.18,349.23],6.4],
];

function makeNote(freq, t, dur, vol, type='sine', vibrato=false) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if(vibrato) {
    // 轻微颤音模拟弦乐
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.frequency.value = 5.5;
    lfoG.gain.value = 2.5;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    lfo.start(t); lfo.stop(t+dur+0.1);
    musicNodes.push(lfo, lfoG);
  }
  // 自然包络
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + Math.min(0.12, dur*0.2));
  g.gain.setValueAtTime(vol * 0.75, t + dur * 0.6);
  g.gain.linearRampToValueAtTime(0, t + dur);
  // 简单混响
  const rev = audioCtx.createDelay(0.5);
  const revG = audioCtx.createGain();
  rev.delayTime.value = 0.28; revG.gain.value = 0.15;
  osc.connect(g);
  g.connect(audioCtx.destination);
  g.connect(rev); rev.connect(revG); revG.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur + 0.2);
  musicNodes.push(osc, g, rev, revG);
}

function scheduleLoop(startT) {
  // 旋律声部（主旋律，带颤音）
  let t = startT;
  MELODY.forEach(([f, d]) => {
    makeNote(f, t, d*0.55, 0.09, 'sine', true);
    t += d * 0.55;
  });
  // 低音声部
  let bt = startT;
  BASS.forEach(([f, d]) => {
    makeNote(f, bt, d*0.55, 0.06, 'sine', false);
    bt += d * 0.55;
  });
  // 和弦衬底（极轻）
  let ct = startT;
  CHORDS.forEach(([notes, d]) => {
    notes.forEach(f => makeNote(f, ct, d*0.55*0.9, 0.025, 'sine', false));
    ct += d * 0.55;
  });
  return t - startT; // 返回总时长
}

function startMusic() {
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  _stopNodes();
  musicOn = true;
  document.getElementById('music-btn').textContent = '♫';
  let loopT = audioCtx.currentTime + 0.15;
  function loop() {
    const dur = scheduleLoop(loopT);
    loopT += dur;
    musicScheduler = setTimeout(loop, Math.max(100, (dur - 1.5) * 1000));
  }
  loop();
}

function _stopNodes() {
  if(musicScheduler){ clearTimeout(musicScheduler); musicScheduler=null; }
  const t = audioCtx ? audioCtx.currentTime + 0.4 : 0;
  musicNodes.forEach(n=>{ try{ n.stop&&n.stop(t); n.disconnect&&n.disconnect(); }catch(e){} });
  musicNodes=[];
}

function stopMusic() {
  musicOn = false;
  document.getElementById('music-btn').textContent = '♪';
  _stopNodes();
}

document.getElementById('music-btn').addEventListener('click',()=>{
  musicOn ? stopMusic() : startMusic();
});

function gameLoop(ts) {
  if(!running||paused||gameOver) return;
  if(!lastDrop) lastDrop=ts;
  if(ts-lastDrop>Math.max(100,800-(level-1)*70)){drop();lastDrop=ts;}
  draw(); updateParticles(); animFrame=requestAnimationFrame(gameLoop);
}

// 兜底定时器，防止 requestAnimationFrame 在本地file://被节流
let fallbackTimer=null;
function startFallback(){
  if(fallbackTimer) clearInterval(fallbackTimer);
  fallbackTimer=setInterval(()=>{
    if(!running||paused||gameOver){clearInterval(fallbackTimer);fallbackTimer=null;return;}
    // 仅在 rAF 不工作时兜底驱动下落
  },50);
}

function drop(){piece.y++; if(collide()){piece.y--;lock();}}

function endGame() {
  gameOver=true; running=false; cancelAnimationFrame(animFrame);
  stopMusic();
  document.getElementById('overlay-title').textContent='已结束';
  document.getElementById('overlay-sub').textContent=`得分 ${score} · 消行 ${lines}`;
  document.getElementById('start-btn').textContent='再来一局';
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('virtual-controls').style.display='none';
}

document.addEventListener('keydown',e=>{
  if(!running||gameOver) return;
  if(e.key==='p'||e.key==='P'){paused=!paused;if(!paused){lastDrop=null;animFrame=requestAnimationFrame(gameLoop);}return;}
  if(paused) return;
  switch(e.key){
    case 'ArrowLeft': piece.x--;if(collide())piece.x++;break;
    case 'ArrowRight': piece.x++;if(collide())piece.x--;break;
    case 'ArrowDown': drop();score++;updateUI();break;
    case 'ArrowUp':{const rot=rotate(piece.shape),prev=piece.shape;piece.shape=rot;if(collide())piece.shape=prev;break;}
    case ' ':e.preventDefault();while(!collide({...piece,y:piece.y+1})){piece.y++;score+=2;}lock();updateUI();break;
  }
  draw();
});

function vib(ms){if(navigator.vibrate)navigator.vibrate(ms||25);}
function bindV(id,fn){
  const b=document.getElementById(id);
  b.addEventListener('touchstart',e=>{e.preventDefault();vib(25);fn();draw();},{passive:false});
  b.addEventListener('mousedown',()=>{fn();draw();});
}
bindV('btn-left',()=>{if(!running||paused||gameOver)return;piece.x--;if(collide())piece.x++;});
bindV('btn-right',()=>{if(!running||paused||gameOver)return;piece.x++;if(collide())piece.x--;});
bindV('btn-down',()=>{if(!running||paused||gameOver)return;drop();score++;updateUI();});
bindV('btn-rotate',()=>{if(!running||paused||gameOver)return;const rot=rotate(piece.shape),prev=piece.shape;piece.shape=rot;if(collide())piece.shape=prev;});
bindV('btn-drop',()=>{if(!running||paused||gameOver)return;vib(40);while(!collide({...piece,y:piece.y+1})){piece.y++;score+=2;}lock();updateUI();});

document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('virtual-controls').style.display='flex';
  init(); resizeAll(); running=true; lastDrop=null;
  startMusic();
  animFrame=requestAnimationFrame(gameLoop);
  // 兜底：直接用 setInterval 驱动下落，彻底解决本地打开问题
  if(fallbackTimer) clearInterval(fallbackTimer);
  fallbackTimer=setInterval(()=>{
    if(!running||paused||gameOver) return;
    const now=performance.now();
    if(!lastDrop) lastDrop=now;
    if(now-lastDrop>Math.max(100,800-(level-1)*70)){drop();lastDrop=now;draw();}
  },16);
});

resizeAll();
</script>
</body>
</html>
